catalogMode: prefer

cleanupUnusedCatalogs: true

# --- Supply-chain security hardening ---

# Block transitive deps from using git/tarball sources
blockExoticSubdeps: true

# Error (not warn) on unlisted build scripts
strictDepBuilds: true

# Explicit allowlist replaces deprecated onlyBuiltDependencies
allowBuilds:
  esbuild: true
  msw: true

# Prevent installing packages whose trust evidence (provenance/signatures) regressed
trustPolicy: no-downgrade

overrides:
  esbuild: '>=0.28.0'
  vite: 'catalog:'
  vitest: 'catalog:'

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
